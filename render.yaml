# Archivo de configuración para Render.com
services:
  - type: web
    name: mi-backend-super-api
    runtime: python
    plan: starter
    buildCommand: "./build.sh"
    startCommand: "python -m alembic upgrade heads && uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: ENVIRONMENT
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_LLM_FAST_MODEL
        value: meta-llama/llama-4-scout-17b-16e-instruct
      - key: GROQ_LLM_REASONING_MODEL
        value: openai/gpt-oss-120b
      - key: GROQ_LLM_REASONING_EFFORT
        value: medium
      - key: PORT
        fromService: 
          type: web
          name: mi-backend-super-api
          property: port
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_SYNC
        sync: false
      - key: USE_ELEVENLABS_API
        value: "true"
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_MODEL
        value: eleven_multilingual_v2
      - key: ELEVENLABS_VOICE
        value: Antoni
      - key: ELEVENLABS_STABILITY
        value: "0.5"
      - key: ELEVENLABS_SIMILARITY_BOOST
        value: "0.75"