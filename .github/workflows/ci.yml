name: CI

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8 mypy

      - name: Lint (flake8)
        run: |
          flake8 main.py routers middlewares services utils models database

      - name: Typecheck (mypy)
        continue-on-error: true
        run: |
          mypy --ignore-missing-imports main.py routers services || true

      - name: Tests (pytest)
        env:
          ENVIRONMENT: test
          DEBUG: "false"
        run: |
          pytest -q

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-and-quality]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build
        run: |
          docker build --build-arg GIT_SHA=${{ github.sha }} -t mi-backend-super:${{ github.sha }} .
